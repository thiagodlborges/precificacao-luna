<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Luna — Controle de Perdas</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bordo:#6B1E2E; --bordo-dark:#4A1220; --bordo-light:#8B3345;
    --creme:#F5EFE4; --creme-dark:#EDE4D4; --marrom:#A0785A;
    --marrom-light:#C4A882; --marrom-dark:#7A5840;
    --text:#2C1810; --text-light:#6B4F3A; --white:#FDFAF6;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{overflow-x:hidden;max-width:100vw}
  body{font-family:'Jost',sans-serif;background:var(--creme);color:var(--text);min-height:100vh}
  a{color:inherit}

  #carregandoOverlay{position:fixed;inset:0;z-index:99999;background:linear-gradient(145deg,#4A1220 0%,#2C0A14 60%,#1A0008 100%);display:flex;align-items:center;justify-content:center;color:#C4A882;font-size:.85rem;letter-spacing:.1em;text-transform:uppercase;text-align:center;padding:20px}

  #appRoot{display:none}
  header{background:var(--bordo);color:var(--creme);padding:14px 26px;display:flex;align-items:center;gap:20px;flex-wrap:wrap;box-shadow:0 2px 14px rgba(74,18,32,.25)}
  .brand{font-family:'Cormorant Garamond',serif;font-weight:600;font-size:1.4rem}
  .brand-sub{font-size:.68rem;letter-spacing:.18em;text-transform:uppercase;color:var(--marrom-light);margin-top:-2px}
  header .spacer{flex:1}
  header select{background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.3);color:var(--creme);padding:8px 12px;border-radius:6px;font-family:'Jost',sans-serif;font-size:.82rem}
  header select option{color:var(--text)}
  .hbtn{background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.3);color:var(--creme);padding:8px 14px;border-radius:6px;cursor:pointer;font-size:.78rem;text-decoration:none;display:inline-flex;align-items:center;gap:6px;transition:background .15s}
  .hbtn:hover{background:rgba(255,255,255,.22)}

  nav.tabs{display:flex;gap:2px;background:var(--white);border-bottom:1px solid var(--creme-dark);padding:0 26px;overflow-x:auto}
  .tab{padding:14px 18px;font-size:.82rem;font-weight:500;color:var(--text-light);cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap}
  .tab.active{color:var(--bordo);border-bottom-color:var(--bordo);font-weight:600}

  main{max-width:1140px;margin:0 auto;padding:28px 26px 60px}
  .card{background:var(--white);border:1px solid var(--creme-dark);border-radius:12px;padding:22px;margin-bottom:18px}
  .card h2{font-family:'Cormorant Garamond',serif;font-size:1.3rem;color:var(--bordo-dark);margin-bottom:14px}
  .card p.hint{font-size:.82rem;color:var(--text-light);margin-bottom:14px}
  .row{display:flex;gap:10px;flex-wrap:wrap;align-items:flex-end;margin-bottom:14px}
  .field{display:flex;flex-direction:column;gap:4px}
  .field label{font-size:.68rem;text-transform:uppercase;letter-spacing:.06em;color:var(--text-light);font-weight:500}
  .inp,select.inp,textarea.inp{padding:9px 12px;border:1.5px solid var(--creme-dark);border-radius:7px;font-family:'Jost',sans-serif;font-size:.85rem;color:var(--text);background:var(--white)}
  .inp:focus{outline:none;border-color:var(--marrom)}
  .btn{background:var(--bordo);color:var(--creme);border:none;padding:10px 18px;border-radius:7px;font-size:.78rem;font-weight:600;letter-spacing:.05em;text-transform:uppercase;cursor:pointer;transition:background .15s}
  .btn:hover{background:var(--bordo-dark)}
  .btn:disabled{opacity:.5;cursor:default}
  .btn-outline{background:none;border:1.5px solid var(--bordo);color:var(--bordo)}
  .btn-outline:hover{background:var(--bordo);color:var(--creme)}
  .btn-danger{background:none;border:none;color:#B43C3C;cursor:pointer;font-size:.85rem}
  .btn-sm{padding:6px 12px;font-size:.72rem}

  .table-wrap{width:100%;overflow-x:auto;-webkit-overflow-scrolling:touch}
  table{width:100%;min-width:560px;border-collapse:collapse;font-size:.82rem}
  th{text-align:left;padding:9px 10px;background:var(--creme);color:var(--text-light);font-size:.68rem;text-transform:uppercase;letter-spacing:.05em}
  td{padding:9px 10px;border-top:1px solid var(--creme-dark);vertical-align:top}
  tr.inativo td{color:var(--text-light);opacity:.6}
  tr.total-row td{font-weight:600;border-top:2px solid var(--creme-dark)}
  .badge{display:inline-block;padding:3px 10px;border-radius:20px;font-size:.68rem;font-weight:600;white-space:nowrap}
  .badge-ativo{background:#E8F8F0;color:#27AE60}
  .badge-inativo{background:#FDEDEC;color:#B43C3C}
  .badge-tipo{background:var(--creme);color:var(--marrom-dark)}

  .empty{text-align:center;padding:40px;color:var(--text-light);font-size:.85rem}
  .loading{text-align:center;padding:30px;color:var(--text-light)}

  .stat-box{display:flex;gap:18px;flex-wrap:wrap;margin-bottom:18px}
  .stat{background:var(--creme);border-radius:10px;padding:18px 22px;min-width:170px}
  .stat .num{font-family:'Cormorant Garamond',serif;font-size:2rem;color:var(--bordo-dark);font-weight:600;line-height:1}
  .stat .lbl{font-size:.7rem;text-transform:uppercase;letter-spacing:.06em;color:var(--text-light);margin-top:6px}

  .modal-overlay{display:none;position:fixed;inset:0;background:rgba(44,24,16,.5);z-index:500;align-items:center;justify-content:center;padding:20px}
  .modal-overlay.show{display:flex}
  .modal{width:100%;max-width:480px;max-height:88vh;overflow:auto;background:var(--white);border-radius:14px;padding:26px}
  .modal h3{font-family:'Cormorant Garamond',serif;font-size:1.25rem;color:var(--bordo-dark);margin-bottom:14px}
  .modal-actions{display:flex;gap:10px;margin-top:16px}
  .modal-close{background:none;border:none;color:var(--marrom-dark);text-decoration:underline;cursor:pointer;font-size:.78rem;display:block;margin:14px auto 0}
  .msg{font-size:.78rem;margin-top:8px;display:none}
  .msg.show{display:block}
  .msg.err{color:#B43C3C}
  .msg.ok{color:#27AE60}

  @media (max-width:600px){
    header{padding:12px 16px}
    nav.tabs{padding:0 16px}
    main{padding:20px 16px 50px}
    .card{padding:16px}
  }
</style>
</head>
<body>

<div id="carregandoOverlay">Carregando…</div>

<div id="appRoot">
<header>
  <div>
    <div class="brand">LUNA <span style="font-size:.7em;font-weight:400">Perdas</span></div>
    <div class="brand-sub">Controle de Perdas</div>
  </div>
  <div class="field" id="seletorLojaWrap" style="min-width:220px">
    <label style="color:var(--marrom-light)">Loja</label>
    <select id="seletorLoja" class="inp" onchange="onTrocarLoja()"></select>
  </div>
  <div class="spacer"></div>
  <a href="https://thiagodlborges.github.io/Sistema-Luna/" class="hbtn">← Sistema Luna</a>
  <button class="hbtn" onclick="sairApp()">Sair</button>
</header>

<nav class="tabs">
  <div class="tab active" id="tabNova" data-tab="nova" onclick="mudarTab('nova')">➕ Nova Perda</div>
  <div class="tab" id="tabHistorico" data-tab="historico" onclick="mudarTab('historico')">📋 Histórico</div>
  <div class="tab" id="tabRelatorio" style="display:none" data-tab="relatorio" onclick="mudarTab('relatorio')">📊 Relatório Mensal</div>
</nav>

<main id="mainContent"><div class="loading">Carregando…</div></main>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script>
const SUPABASE_URL = 'https://pbuhwpcpdcnaheaywmdv.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBidWh3cGNwZGNuYWhlYXl3bWR2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYyNjU5MzksImV4cCI6MjA5MTg0MTkzOX0.Mg4PVg96ZiV3C2Rn0GLQU9c7ui_41OlU6Ldqn5jcvyY';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
const PORTAL_URL = 'https://thiagodlborges.github.io/Sistema-Luna/';
const $ = id => document.getElementById(id);

const TODAS_LOJAS = ['Esplanada','Cianê','Tucuruvi','Indaiatuba','Jundiaí','Praça da Moça - Diadema','Buriti Mogi Guaçu','SP Market','Iguatemi Campinas','Shopping Itaquera','Atrium'];
const MOTIVOS = ['Vencimento','Cristalização','Impróprio para Consumo','Extravio','Desperdício','Furto','Degustação','Treinamento','Outro'];

let meuPerfil = null;
let minhasLojas = [];
let lojaAtual = null;
let currentTab = 'nova';
let souBackoffice = false;
let souMaster = false;
let temPapelDeLoja = false;
let produtosPrecificacaoCache = null;

function esc(s){ return (s==null?'':String(s)).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function fmtData(d){ return d ? new Date(d+'T12:00').toLocaleDateString('pt-BR') : '—'; }
function fmtMoeda(v){ return (Number(v)||0).toLocaleString('pt-BR', { style:'currency', currency:'BRL' }); }
function fecharModal(id){ $(id).classList.remove('show'); }
function showMsg(id, txt, tipo){ const m=$(id); m.textContent=txt; m.className='msg'+(txt?' show '+(tipo||''):''); }

async function sairApp(){
  await sb.auth.signOut();
  window.location.href = PORTAL_URL;
}

async function verificarAcessoEIniciar(){
  const { data: { session } } = await sb.auth.getSession();
  if (!session) { window.location.href = PORTAL_URL; return; }

  const { data: ok, error } = await sb.rpc('tem_acesso', { p_slug: 'perdas' });
  if (error || !ok) { await sb.auth.signOut(); window.location.href = PORTAL_URL; return; }

  const { data: perfil } = await sb.from('perfis').select('*').eq('id', session.user.id).single();
  if (!perfil) { window.location.href = PORTAL_URL; return; }
  meuPerfil = perfil;

  temPapelDeLoja = ['loja','master_loja','master'].includes(perfil.tipo);
  souBackoffice = perfil.tipo === 'master' || perfil.perdas_backoffice === true;
  souMaster = perfil.tipo === 'master';

  if (perfil.tipo === 'master' || perfil.tipo === 'master_loja') minhasLojas = [...TODAS_LOJAS];
  else if (perfil.lojas && perfil.lojas.length) minhasLojas = perfil.lojas;
  else if (perfil.loja) minhasLojas = [perfil.loja];
  else minhasLojas = [];

  if (!temPapelDeLoja || !minhasLojas.length) {
    // Backoffice puro (tipo externo, sem loja) — esconde as telas de loja
    ['tabNova','tabHistorico'].forEach(id => { const el = $(id); if (el) el.remove(); });
    $('seletorLojaWrap').style.display = 'none';
    currentTab = souBackoffice ? 'relatorio' : 'nova';
  } else {
    const sel = $('seletorLoja');
    sel.innerHTML = minhasLojas.map(l => '<option value="'+esc(l)+'">'+esc(l)+'</option>').join('');
    lojaAtual = minhasLojas[0];
  }

  if (souBackoffice) { $('tabRelatorio').style.display = ''; }

  document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.tab===currentTab));
  document.getElementById('appRoot').style.display = 'block';
  document.getElementById('carregandoOverlay').remove();
  renderTab();
}

function onTrocarLoja(){ lojaAtual = $('seletorLoja').value; renderTab(); }

function mudarTab(tab){
  currentTab = tab;
  document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.tab===tab));
  renderTab();
}

function renderTab(){
  if(currentTab==='nova') renderNovaPerda();
  else if(currentTab==='historico') renderHistorico();
  else if(currentTab==='relatorio') renderRelatorio();
}

// ── NOVA PERDA ────────────────────────────────────────────
async function renderNovaPerda(){
  const el = $('mainContent');
  const hoje = new Date().toISOString().slice(0,10);
  el.innerHTML =
    '<div class="card">'+
      '<h2>Nova Perda — '+esc(lojaAtual)+'</h2>'+
      '<div id="itemFieldsWrap" class="row"><div class="loading">Carregando…</div></div>'+
      '<div class="row">'+
        '<div class="field"><label>Data da perda</label><input class="inp" type="date" id="perdaData" value="'+hoje+'" max="'+hoje+'"></div>'+
        '<div class="field"><label>Motivo</label><select class="inp" id="perdaMotivo">'+
          MOTIVOS.map(m=>'<option value="'+m+'">'+m+'</option>').join('')+
        '</select></div>'+
      '</div>'+
      '<div class="field" style="margin-bottom:14px"><label>Observação (opcional)</label><textarea class="inp" id="perdaObs" rows="2"></textarea></div>'+
      '<div class="msg" id="novaPerdaMsg"></div>'+
      '<button class="btn" id="btnRegistrarPerda" onclick="registrarPerda()">Registrar Perda</button>'+
    '</div>';
  await carregarSeletorProduto();
}

async function carregarProdutosPrecificacao(){
  if(produtosPrecificacaoCache) return produtosPrecificacaoCache;
  const { data, error } = await sb.rpc('get_precificacao_produtos_ativos');
  if(error) throw error;
  produtosPrecificacaoCache = data || [];
  return produtosPrecificacaoCache;
}

async function carregarSeletorProduto(){
  const wrap = $('itemFieldsWrap');
  if(!wrap) return;
  wrap.innerHTML = '<div class="loading">Carregando…</div>';
  showMsg('novaPerdaMsg','','');

  let produtos;
  try { produtos = await carregarProdutosPrecificacao(); }
  catch(error){ wrap.innerHTML = '<div class="empty">Erro ao carregar produtos: '+esc(error.message)+'</div>'; return; }

  if(!produtos.length){
    wrap.innerHTML = '<div class="empty">Nenhum produto ativo cadastrado na Precificação.</div>';
    return;
  }

  const porCategoria = {};
  produtos.forEach(p => { (porCategoria[p.categoria] = porCategoria[p.categoria] || []).push(p); });

  const optgroups = Object.keys(porCategoria).sort().map(cat =>
    '<optgroup label="'+esc(cat)+'">'+
      porCategoria[cat].map(p => '<option value="'+p.id+'" data-origem="'+esc(p.origem)+'">'+esc(p.nome)+'</option>').join('')+
    '</optgroup>'
  ).join('');

  wrap.innerHTML =
    '<div class="field" style="flex:2"><label>Produto</label><select class="inp" id="perdaProduto" onchange="atualizarUnidadeLabel()">'+
      optgroups+
    '</select></div>'+
    '<div class="field"><label id="perdaQtdLabel">Quantidade</label><input class="inp" type="number" step="0.01" min="0.01" id="perdaQtd"></div>';
  atualizarUnidadeLabel();
}

function atualizarUnidadeLabel(){
  const sel = $('perdaProduto');
  const lbl = $('perdaQtdLabel');
  if(!sel || !lbl) return;
  const opt = sel.options[sel.selectedIndex];
  // Mesma regra do trigger fn_perdas_calcular_custo: kg só pros sabores vendidos por peso
  // (origem fabrica_insumo). Todo o resto — inclusive Copinho/Casquinha/Cestinha, que também
  // são categoria Gelato — é por unidade.
  const unidade = (opt && opt.dataset.origem === 'fabrica_insumo') ? 'kg' : 'un';
  lbl.textContent = 'Quantidade (' + unidade + ')';
}

async function registrarPerda(){
  const data_perda = $('perdaData').value;
  const motivo = $('perdaMotivo').value;
  const observacao = $('perdaObs').value.trim() || null;
  const quantidade = Number($('perdaQtd').value);
  const produtoSel = $('perdaProduto');

  if(!data_perda){ showMsg('novaPerdaMsg','Informe a data da perda.','err'); return; }
  if(!produtoSel || !produtoSel.value){ showMsg('novaPerdaMsg','Selecione um produto.','err'); return; }
  if(!quantidade || quantidade <= 0){ showMsg('novaPerdaMsg','Informe uma quantidade válida.','err'); return; }

  // item_nome, tipo_perda, unidade e custo_unitario_aplicado são preenchidos
  // automaticamente pelo trigger fn_perdas_calcular_custo a partir da Precificação.
  const payload = {
    loja: lojaAtual,
    precificacao_produto_id: produtoSel.value,
    quantidade,
    motivo,
    observacao,
    data_perda,
    registrado_por: meuPerfil.id,
    registrado_por_nome: meuPerfil.nome,
  };

  const btn = $('btnRegistrarPerda');
  btn.disabled = true; btn.textContent = 'Salvando…';
  const { data, error } = await sb.from('perdas').insert(payload).select().single();
  btn.disabled = false; btn.textContent = 'Registrar Perda';

  if(error){ showMsg('novaPerdaMsg','Erro: '+error.message,'err'); return; }
  showMsg('novaPerdaMsg','Perda registrada! Valor: '+fmtMoeda(data.valor_total),'ok');
  setTimeout(() => renderNovaPerda(), 1200);
}

// ── HISTÓRICO (loja) ──────────────────────────────────────
function labelTipo(tipo){
  return { gelato:'Gelato', revenda:'Revenda', variegato:'Variegato' }[tipo] || tipo;
}

async function renderHistorico(){
  const el = $('mainContent');
  const mesDefault = new Date().toISOString().slice(0,7);
  el.innerHTML =
    '<div class="card">'+
      '<div style="display:flex;justify-content:space-between;align-items:flex-end;flex-wrap:wrap;gap:10px;margin-bottom:14px">'+
        '<h2 style="margin:0">Histórico — '+esc(lojaAtual)+'</h2>'+
        '<div class="field"><label>Mês</label><input class="inp" type="month" id="histMes" value="'+mesDefault+'" onchange="carregarHistorico()"></div>'+
      '</div>'+
      '<div id="historicoTabela" class="loading">Carregando…</div>'+
    '</div>';
  await carregarHistorico();
}

async function carregarHistorico(){
  const mes = $('histMes').value;
  const [ano, mesNum] = mes.split('-').map(Number);
  const primeiroDia = mes+'-01';
  const ultimoDia = new Date(ano, mesNum, 0).toISOString().slice(0,10);

  const { data, error } = await sb.from('perdas').select('*')
    .eq('loja', lojaAtual)
    .gte('data_perda', primeiroDia).lte('data_perda', ultimoDia)
    .order('data_perda', { ascending:false });

  if(error){ $('historicoTabela').innerHTML = '<div class="empty">Erro: '+esc(error.message)+'</div>'; return; }
  const lista = data || [];
  if(!lista.length){ $('historicoTabela').innerHTML = '<div class="empty">Nenhuma perda registrada neste mês.</div>'; return; }

  const totalValor = lista.reduce((a,p)=>a+Number(p.valor_total),0);
  $('historicoTabela').innerHTML =
    '<div class="stat-box"><div class="stat"><div class="num">'+fmtMoeda(totalValor)+'</div><div class="lbl">Total do mês</div></div>'+
    '<div class="stat"><div class="num">'+lista.length+'</div><div class="lbl">Lançamentos</div></div></div>'+
    '<div class="table-wrap"><table><thead><tr><th>Data</th><th>Tipo</th><th>Item</th><th>Qtd</th><th>Motivo</th><th>Observação</th><th>Valor</th>'+(souMaster?'<th></th>':'')+'</tr></thead><tbody>'+
      lista.map(p => (
        '<tr>'+
          '<td>'+fmtData(p.data_perda)+'</td>'+
          '<td><span class="badge badge-tipo">'+labelTipo(p.tipo_perda)+'</span></td>'+
          '<td>'+esc(p.item_nome)+'</td>'+
          '<td>'+Number(p.quantidade)+' '+esc(p.unidade)+'</td>'+
          '<td>'+esc(p.motivo)+'</td>'+
          '<td>'+esc(p.observacao||'—')+'</td>'+
          '<td>'+fmtMoeda(p.valor_total)+'</td>'+
          (souMaster ? '<td><button class="btn-danger" onclick="excluirPerda(\''+p.id+'\')">Excluir</button></td>' : '')+
        '</tr>'
      )).join('')+
    '</tbody></table></div>'+
    (souMaster
      ? '<p style="font-size:.72rem;color:var(--text-light);margin-top:10px">Só o master pode excluir lançamentos por aqui — a exclusão é definitiva.</p>'
      : '<p style="font-size:.72rem;color:var(--text-light);margin-top:10px">Lançamentos não podem ser editados ou excluídos por aqui. Em caso de erro, fale com o master.</p>');
}

async function excluirPerda(id){
  if(!confirm('Excluir este lançamento de perda? Essa ação não pode ser desfeita.')) return;
  const { error } = await sb.from('perdas').delete().eq('id', id);
  if(error){ alert('Erro ao excluir: '+error.message); return; }
  carregarHistorico();
}

// ── RELATÓRIO MENSAL (master/backoffice) ──────────────────
async function renderRelatorio(){
  const mesDefault = new Date().toISOString().slice(0,7);
  $('mainContent').innerHTML =
    '<div class="card">'+
      '<div style="display:flex;justify-content:space-between;align-items:flex-end;flex-wrap:wrap;gap:10px;margin-bottom:14px">'+
        '<div class="field"><label>Mês de referência</label><input class="inp" type="month" id="relMes" value="'+mesDefault+'" onchange="carregarRelatorio()"></div>'+
        '<button class="btn-outline btn btn-sm" onclick="exportarRelatorioExcel()">⬇ Exportar Excel</button>'+
      '</div>'+
      '<div id="relatorioConteudo" class="loading">Carregando…</div>'+
    '</div>';
  await carregarRelatorio();
}

async function carregarRelatorio(){
  const mes = $('relMes').value;
  const mesRef = mes+'-01';
  const [ano, mesNum] = mes.split('-').map(Number);
  const ultimoDia = new Date(ano, mesNum, 0).toISOString().slice(0,10);

  const [resumoR, detalheR] = await Promise.all([
    sb.from('vw_perdas_resumo_mensal').select('*').eq('mes_referencia', mesRef),
    sb.from('perdas').select('*').gte('data_perda', mesRef).lte('data_perda', ultimoDia).order('loja').order('data_perda'),
  ]);
  if(resumoR.error){ $('relatorioConteudo').innerHTML = '<div class="empty">Erro: '+esc(resumoR.error.message)+'</div>'; return; }
  const resumo = resumoR.data || [];
  const detalhe = detalheR.data || [];
  window.__relatorioResumoCache = resumo;
  window.__relatorioDetalheCache = detalhe;

  // Agrega por loja
  const porLoja = {};
  resumo.forEach(r => {
    if(!porLoja[r.loja]) porLoja[r.loja] = { qtd:0, valor:0 };
    porLoja[r.loja].qtd += Number(r.qtd_lancamentos);
    porLoja[r.loja].valor += Number(r.valor_total);
  });
  const lojas = Object.keys(porLoja).sort();
  const totalGeral = lojas.reduce((a,l)=>a+porLoja[l].valor,0);
  const qtdGeral = lojas.reduce((a,l)=>a+porLoja[l].qtd,0);

  // Agrega por tipo_perda
  const porTipo = {};
  resumo.forEach(r => {
    porTipo[r.tipo_perda] = (porTipo[r.tipo_perda]||0) + Number(r.valor_total);
  });

  const tabelaLoja = lojas.length ?
    '<div class="table-wrap"><table><thead><tr><th>Loja</th><th>Lançamentos</th><th>Valor Total</th></tr></thead><tbody>'+
      lojas.map(l => '<tr><td>'+esc(l)+'</td><td>'+porLoja[l].qtd+'</td><td>'+fmtMoeda(porLoja[l].valor)+'</td></tr>').join('')+
      '<tr class="total-row"><td>Total Geral</td><td>'+qtdGeral+'</td><td>'+fmtMoeda(totalGeral)+'</td></tr>'+
    '</tbody></table></div>'
    : '<div class="empty">Nenhuma perda registrada neste mês.</div>';

  const tabelaTipo = Object.keys(porTipo).length ?
    '<div class="table-wrap"><table><thead><tr><th>Tipo</th><th>Valor Total</th></tr></thead><tbody>'+
      Object.keys(porTipo).map(t => '<tr><td>'+labelTipo(t)+'</td><td>'+fmtMoeda(porTipo[t])+'</td></tr>').join('')+
    '</tbody></table></div>' : '';

  $('relatorioConteudo').innerHTML =
    '<h3 style="font-family:\'Cormorant Garamond\',serif;font-size:1.05rem;color:var(--bordo-dark);margin-bottom:8px">Resumo por loja</h3>'+
    tabelaLoja+
    '<h3 style="font-family:\'Cormorant Garamond\',serif;font-size:1.05rem;color:var(--bordo-dark);margin:22px 0 8px">Resumo por tipo de perda</h3>'+
    tabelaTipo;
}

function exportarRelatorioExcel(){
  const detalhe = window.__relatorioDetalheCache || [];
  if(!detalhe.length){ alert('Não há dados para exportar.'); return; }
  const mes = $('relMes').value;

  const porLoja = {};
  detalhe.forEach(p => {
    if(!porLoja[p.loja]) porLoja[p.loja] = { qtd:0, valor:0 };
    porLoja[p.loja].qtd += 1;
    porLoja[p.loja].valor += Number(p.valor_total);
  });
  const linhasResumo = Object.keys(porLoja).sort().map(l => ({
    Loja: l, Lançamentos: porLoja[l].qtd, 'Valor Total (R$)': porLoja[l].valor,
  }));
  const totalGeral = Object.values(porLoja).reduce((a,l)=>a+l.valor,0);
  const qtdGeral = Object.values(porLoja).reduce((a,l)=>a+l.qtd,0);
  linhasResumo.push({ Loja: 'TOTAL GERAL', Lançamentos: qtdGeral, 'Valor Total (R$)': totalGeral });

  const linhasDetalhe = detalhe.map(p => ({
    Loja: p.loja, Data: fmtData(p.data_perda), Tipo: labelTipo(p.tipo_perda), Item: p.item_nome,
    Quantidade: Number(p.quantidade), Unidade: p.unidade, Motivo: p.motivo,
    Observação: p.observacao||'', 'Valor (R$)': Number(p.valor_total),
  }));

  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(linhasResumo), 'Resumo por Loja');
  XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(linhasDetalhe), 'Lançamentos Detalhados');
  XLSX.writeFile(wb, 'perdas-'+mes+'.xlsx');
}

verificarAcessoEIniciar();
</script>
